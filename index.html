<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اضغط هنا</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    button {
      padding: 20px 40px;
      font-size: 24px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      background: white;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #emoji {
      display: none;
      font-size: 120px;
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0% {
        transform: scale(0);
      }
      100% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <button id="btn">اضغط هنا</button>

  <div id="emoji">🖕🏽</div>

  <script>
    const btn = document.getElementById("btn");
    const emoji = document.getElementById("emoji");

    btn.onclick = () => {
      btn.style.display = "none";
      emoji.style.display = "block";
    };
  </script>

</body>
</html>
