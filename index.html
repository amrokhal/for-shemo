<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>اضغط هنا</title>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 20px 40px;
      font-size: 28px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #wall {
      display: none;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      word-break: break-word;
      font-size: 45px;
      line-height: 1.2;
      padding: 10px;
      box-sizing: border-box;
      user-select: none;
    }
  </style>
</head>

<body>

  <button id="btn">اضغط هنا</button>

  <div id="wall"></div>

  <script>
    const btn = document.getElementById("btn");
    const wall = document.getElementById("wall");

    btn.onclick = () => {
      btn.style.display = "none";
      wall.style.display = "block";

      let emojis = "";

      for (let i = 0; i < 2000; i++) {
        emojis += "🖕🏽 ";
      }

      wall.innerHTML = emojis;
    };
  </script>

</body>
</html>
