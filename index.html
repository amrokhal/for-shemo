<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Shaimaa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }body {
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #1d102b, #4b1f73, #7c3aed);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
}

.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.7;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%, 100% {
    opacity: 0.2;
  }
  50% {
    opacity: 1;
  }
}

.container {
  width: 90%;
  max-width: 420px;
  padding: 30px;
  border-radius: 28px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.15);
  text-align: center;
  z-index: 1;
  box-shadow: 0 0 30px rgba(0,0,0,0.3);
}

h1 {
  font-size: 2rem;
  margin-bottom: 10px;
  font-weight: 700;
}

.subtitle {
  color: #e9d5ff;
  margin-bottom: 30px;
  font-size: 0.95rem;
}

.countdown-title {
  font-size: 1.1rem;
  margin-bottom: 12px;
}

.countdown {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 30px;
}

.time-box {
  background: rgba(255,255,255,0.12);
  padding: 12px 5px;
  border-radius: 16px;
}

.time-box span {
  display: block;
  font-size: 1.3rem;
  font-weight: bold;
}

.time-box small {
  color: #ddd;
  font-size: 0.75rem;
}

.quote-box {
  min-height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 15px;
  background: rgba(255,255,255,0.1);
  border-radius: 18px;
  margin-bottom: 25px;
  font-size: 1.1rem;
  line-height: 1.7;
  transition: 0.3s;
}

button {
  border: none;
  background: #c084fc;
  color: white;
  padding: 14px 22px;
  border-radius: 18px;
  font-size: 1rem;
  font-family: inherit;
  cursor: pointer;
  transition: 0.25s;
  width: 100%;
  font-weight: bold;
  box-shadow: 0 0 18px rgba(192,132,252,0.45);
}

button:hover {
  transform: scale(1.03);
  background: #d8b4fe;
}

.message {
  margin-top: 20px;
  font-size: 1rem;
  color: #f5d0fe;
  opacity: 0;
  transition: 0.4s;
  min-height: 28px;
}

.show {
  opacity: 1;
}

.heart {
  margin-top: 25px;
  font-size: 1.4rem;
  opacity: 0.8;
  animation: float 2.5s infinite ease-in-out;
}

@keyframes float {
  0%,100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-6px);
  }
}

@media(max-width: 480px){
  .container {
    padding: 24px 18px;
  }

  h1 {
    font-size: 1.7rem;
  }

  .quote-box {
    font-size: 1rem;
  }
}

  </style>
</head>
<body><div class="stars"></div><div class="container">
  <h1>شيماء 💜</h1>
  <div class="subtitle">كلها أيام وتعدي</div>  <div class="countdown-title">تبقى 23 يوم</div>  <div class="countdown">
    <div class="time-box">
      <span id="days">23</span>
      <small>يوم</small>
    </div><div class="time-box">
  <span id="hours">00</span>
  <small>ساعة</small>
</div>

<div class="time-box">
  <span id="minutes">00</span>
  <small>دقيقة</small>
</div>

<div class="time-box">
  <span id="seconds">00</span>
  <small>ثانية</small>
</div>

  </div>  <div class="quote-box" id="quote">
    اقري احسن ليك
  </div><button onclick="studyDone()">ذاكرت الليلة؟</button>

  <div class="message" id="message"></div>  <div class="heart">💜</div>
</div><script>
  const quotes = [
    'اقري احسن ليك',
    'كلها ايام وتعدي',
    'خلي الكسل 😠',
    'ما تشيلي هم انتي اشطر وحدة',
    'حتى الصفحة الواحدة بتفرق',
    'ركزي الليلة وارتاحي بعدين',
    'المستقبل محتاج شيماء القوية'
  ];

  let quoteIndex = 0;
  const quoteElement = document.getElementById('quote');

  setInterval(() => {
    quoteIndex = (quoteIndex + 1) % quotes.length;
    quoteElement.style.opacity = 0;

    setTimeout(() => {
      quoteElement.innerText = quotes[quoteIndex];
      quoteElement.style.opacity = 1;
    }, 250);

  }, 4000);

  function studyDone() {
    const message = document.getElementById('message');
    message.innerText = 'احلى وحدة ذاكرت الليلة 💜';
    message.classList.add('show');
  }

  const endDate = new Date();
  endDate.setDate(endDate.getDate() + 23);

  function updateCountdown() {
    const now = new Date().getTime();
    const distance = endDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById('days').innerText = days;
    document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
    document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
    document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
  }

  setInterval(updateCountdown, 1000);
  updateCountdown();

  const starsContainer = document.querySelector('.stars');

  for(let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.classList.add('star');
    star.style.top = Math.random() * 100 + '%';
    star.style.left = Math.random() * 100 + '%';
    star.style.animationDuration = (Math.random() * 3 + 2) + 's';
    starsContainer.appendChild(star);
  }
</script></body>
            </html>
