<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Countdown To Winter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Cairo',sans-serif;
      min-height:100vh;
      overflow:hidden;
      color:white;
      background:
      linear-gradient(to bottom, rgba(0,0,0,.4), rgba(0,0,0,.7)),
      url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
    }

    .overlay{
      position:absolute;
      inset:0;
      backdrop-filter:blur(2px);
    }

    .container{
      position:relative;
      z-index:2;
      width:100%;
      max-width:900px;
    }

    h1{
      font-size:3rem;
      margin-bottom:10px;
      text-shadow:0 0 20px rgba(0,0,0,.5);
    }

    .subtitle{
      font-size:1.2rem;
      opacity:.85;
      margin-bottom:40px;
    }

    .countdown{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
      margin-bottom:40px;
    }

    .box{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      border-radius:20px;
      padding:25px 10px;
      backdrop-filter:blur(10px);
      box-shadow:0 10px 30px rgba(0,0,0,.2);
      transition:.3s;
    }

    .box:hover{
      transform:translateY(-5px);
      background:rgba(255,255,255,.12);
    }

    .number{
      font-size:3rem;
      font-weight:700;
    }

    .label{
      margin-top:10px;
      font-size:1rem;
      opacity:.8;
    }

    .poetry{
      margin-top:20px;
      line-height:2;
      font-size:1.2rem;
      background:rgba(0,0,0,.25);
      padding:25px;
      border-radius:20px;
      backdrop-filter:blur(6px);
    }

    .footer{
      margin-top:25px;
      opacity:.7;
      font-size:.9rem;
    }

    @media(max-width:700px){

      h1{
        font-size:2rem;
      }

      .countdown{
        grid-template-columns:repeat(2,1fr);
      }

      .number{
        font-size:2.2rem;
      }

      .poetry{
        font-size:1rem;
      }
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="container">

    <h1>217 يوماً على بداية فصل الشتاء</h1>

    <p class="subtitle">
      ننتظر الشتاء كأن الطمأنينة تسكن فيه
    </p>

    <div class="countdown">

      <div class="box">
        <div class="number" id="days">0</div>
        <div class="label">يوم</div>
      </div>

      <div class="box">
        <div class="number" id="hours">0</div>
        <div class="label">ساعة</div>
      </div>

      <div class="box">
        <div class="number" id="minutes">0</div>
        <div class="label">دقيقة</div>
      </div>

      <div class="box">
        <div class="number" id="seconds">0</div>
        <div class="label">ثانية</div>
      </div>

    </div>

    <div class="poetry">
      <p>
        "يأتي الشتاء محملاً بالحنين،
        كأن المطر يعرف كل الأشياء التي أخفيناها."
      </p>

      <br>

      <p>
        "وفي البرد،
        تصبح القهوة وطنًا صغيرًا."
      </p>
    </div>

    <div class="footer">
      Made with cold feelings ☁️
    </div>

  </div>

  <script>

    // بداية الشتاء
    const winterDate = new Date("December 1, 2026 00:00:00").getTime();

    const updateCountdown = () => {

      const now = new Date().getTime();

      const distance = winterDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));

      const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24))
        / (1000 * 60 * 60)
      );

      const minutes = Math.floor(
        (distance % (1000 * 60 * 60))
        / (1000 * 60)
      );

      const seconds = Math.floor(
        (distance % (1000 * 60))
        / 1000
      );

      document.getElementById("days").innerHTML = days;
      document.getElementById("hours").innerHTML = hours;
      document.getElementById("minutes").innerHTML = minutes;
      document.getElementById("seconds").innerHTML = seconds;
    }

    updateCountdown();

    setInterval(updateCountdown,1000);

  </script>

</body>
  </html>
